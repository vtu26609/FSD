<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Add Student</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <header>
            <div style="margin-bottom: 2rem;">
                <a th:href="@{/}" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                    <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                    Back to Registry
                </a>
            </div>
            <h1>Enrol Student</h1>
            <p style="color: var(--text-muted);">Assign new identity to the Nexus network</p>
        </header>

        <div class="form-container">
            <form action="#" th:action="@{/saveStudent}" th:object="${student}" method="POST">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}" placeholder="Enter first name..." required />
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}" placeholder="Enter last name..." required />
                </div>

                <div class="form-group">
                    <label>Network Email</label>
                    <input type="email" th:field="*{email}" placeholder="john.doe@university.edu" required />
                </div>

                <div class="form-group">
                    <label>Department Affiliation</label>
                    <input type="text" th:field="*{department}" placeholder="e.g. Cognitive Science" required />
                </div>

                <div style="margin-top: 3rem; display: grid; grid-template-columns: 1fr;">
                    <button type="submit" class="btn btn-primary">
                        <i data-lucide="user-plus"></i>
                        Confirm Enrolment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
