<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student - Student Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h1>Update Student</h1>
        
        <form th:action="@{/saveStudent}" th:object="${student}" method="POST">
            <!-- Hidden field to store Id -->
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label>First Name</label>
                <input type="text" th:field="*{firstName}" placeholder="Enter first name" required>
            </div>
            
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" th:field="*{lastName}" placeholder="Enter last name" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" placeholder="student@example.com" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" th:field="*{department}" placeholder="e.g. Computer Science" required>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Update Student</button>
                <a th:href="@{/}" class="btn btn-secondary" style="flex: 1; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
