<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Audit Logging Dashboard | Task 6</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- SQL.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>AuditShield <span class="badge">Enterprise</span></h1>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">
                    <span class="status-indicator"></span> Real-time Database Monitoring Active
                </p>
            </div>
            <div id="db-status" class="badge" style="border-color: #10b981; color: #10b981;">Database Connected</div>
        </header>

        <div class="dashboard-grid">
            <!-- Left Side: Employee Management -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Employee Management
                </div>
                
                <form id="employee-form">
                    <input type="hidden" id="employee-id">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="employee-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="employee-dept">
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="HR">HR</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Annual Salary ($)</label>
                        <input type="number" id="employee-salary" placeholder="75000" required>
                    </div>
                    <button type="submit" class="btn" id="submit-btn">Add Employee</button>
                    <button type="button" class="btn" id="cancel-btn" style="display:none; background: transparent; margin-top: 0.5rem; border: 1px solid var(--border);">Cancel Edit</button>
                </form>

                <div class="table-container" style="margin-top: 2rem;">
                    <table id="employee-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Dept</th>
                                <th>Salary</th>
                                <th>Updated</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Right Side: Audit Logs -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Live Audit Stream
                </div>
                <div id="audit-stream" class="log-stream">
                    <!-- Logs appear here -->
                </div>

                <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <div class="card-title" style="font-size: 1rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Daily Summary (SQL View)
                    </div>
                    <div class="report-grid" id="daily-report">
                        <!-- Report cards -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
